image boot.vfat {
  vfat {
    files = {
      "MLO",
      "u-boot.img",
      "zImage",
      "am335x-boneblack.dtb"
    }
  }
  size = 96M
}

image sdcard.img {
  hdimage {
  }

  partition boot {
    partition-type = 0x0C
    bootable = true
    image = "boot.vfat"
  }

  partition rootfs {
    partition-type = 0x83
    image = "rootfs.ext4"
  }
}
